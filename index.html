<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Algorithm Adventure</title>
  <meta name="description" content="Playful visual algorithm lessons for total beginners.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Algorithm Adventure home">
      <span class="logo-mark" aria-hidden="true">A</span>
      <span>Algorithm Adventure</span>
    </a>
    <nav aria-label="Main navigation">
      <a href="dp-roadmap.html">Play</a>
    </nav>
  </header>

  <main>
    <section class="hero home-hero">
      <div class="hero-copy">
        <p class="eyebrow">Algorithms without fear</p>
        <h1>Learn the big idea by playing one tiny game.</h1>
        <p class="hero-text">Start with Dynamic Programming: why guessing every path gets painful, and why remembering answers feels like magic.</p>
        <div class="hero-actions">
          <a class="primary-action" href="dp-roadmap.html">Play Level 1</a>
        </div>
      </div>
      <div class="hero-stage" aria-hidden="true">
        <div class="sun"></div>
        <div class="cloud cloud-one"></div>
        <div class="cloud cloud-two"></div>
        <div class="hill hill-one"></div>
        <div class="hill hill-two"></div>
        <div class="preview-stairs">
          <span style="--h:42px"></span>
          <span style="--h:64px"></span>
          <span style="--h:86px"></span>
          <span style="--h:108px"></span>
          <span style="--h:130px"></span>
        </div>
        <div class="dot dot-preview"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    Algorithm Adventure. Static HTML, CSS, and JavaScript.
  </footer>
</body>
</html>
